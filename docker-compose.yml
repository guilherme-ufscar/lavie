name: lavie

networks:
  lavie-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  caddy-data:
  evolution-instances:
  evolution-postgres-data:
  evolution-redis-data:

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "10215:80" # UNICA porta publicada no host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    networks:
      - lavie-net
    depends_on:
      - web
      - api

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    env_file: .env
    networks:
      - lavie-net
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    expose:
      - "4000"
    env_file: .env
    networks:
      - lavie-net
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_USER: lavie
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: lavie
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lavie-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lavie"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - lavie-net

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    networks:
      - lavie-net

  # --- Evolution API (WhatsApp, Fase 4) ---
  # Desligado por padrao. Subir com: docker compose --profile evolution up -d
  evolution:
    image: atendai/evolution-api:v2.3.7
    restart: unless-stopped
    profiles: ["evolution"]
    expose:
      - "8080"
    env_file: .env
    environment:
      DATABASE_CONNECTION_URI: postgresql://evolution:${EVOLUTION_POSTGRES_PASSWORD}@evolution-postgres:5432/evolution
      CACHE_REDIS_URI: redis://evolution-redis:6379
    volumes:
      - evolution-instances:/evolution/instances
    networks:
      - lavie-net
    depends_on:
      - evolution-postgres
      - evolution-redis

  evolution-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["evolution"]
    expose:
      - "5432"
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${EVOLUTION_POSTGRES_PASSWORD}
      POSTGRES_DB: evolution
    volumes:
      - evolution-postgres-data:/var/lib/postgresql/data
    networks:
      - lavie-net

  evolution-redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["evolution"]
    expose:
      - "6379"
    volumes:
      - evolution-redis-data:/data
    networks:
      - lavie-net
